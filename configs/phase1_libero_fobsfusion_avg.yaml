# Phase 1 (LIBERO) — F-OBS-FUSION Arm A DeltaAE REFIT: fused pooled z (dualfusion, 1024-d).
# ══════════════════════════════════════════════════════════════════════════
# phase1_libero_siglip2_large256.yaml 을 그대로 미러링하되 anchor 블록만 dualfusion 으로 스왑.
#   fused z = L2norm(0.5*L2norm(SigLIP2-L256)+0.5*L2norm(DINOv3-vitl16 CLS)) 를 target 공간으로
#   DeltaAE(g/h) 재학습. latent_dim 은 anchor.dim(1024)으로 train_phase1.py:92-93 자동 설정.
# 이 체크포인트가 phase2_libero_fobsfusion_avg.yaml 의 phase1_ckpt.
#   실행:  python src/training/train_phase1.py --config configs/phase1_libero_fobsfusion_avg.yaml
# ══════════════════════════════════════════════════════════════════════════
data:
  source: libero
  root: ~/clip_ws/data/libero/libero_spatial
  camera: agentview_rgb
  chunk_sec: 0.8
  n_chunk: 16
  val_episodes: 0.2
  cache_dir: /data2/clip_ws_cache/cache/libero_emb_fobsfusion_avg   # dualfusion cache_key로 자동 분리

anchor:
  name: dualfusion
  projection: joint
  normalize: true                # 공식 최종 L2norm → 출력 unit
  siglip_dir: google/siglip2-large-patch16-256
  dino_dir: facebook/dinov3-vitl16-pretrain-lvd1689m
  alpha: 0.5
  force_size: 256

model:
  latent_dim: 768              # train_phase1.py:92-93가 anchor.dim(1024)으로 자동 덮어씀
  hidden: 512
  layers: 4
  dropout: 0.2
  state_cond: true

loss:
  align: 0.5
  recon: 0.5
  cycle: 0.25

train:
  batch_size: 256
  lr: 1.0e-4
  adam_betas: [0.95, 0.999]
  scheduler: cosine
  warmup_steps: 500
  epochs: 50
  early_stop_patience: 20
  seed: 0
  checkpoint: ~/clip_ws/checkpoints/phase1_libero_fobsfusion_avg.pt

wandb: {enabled: true, project: clipvp, mode: online, run_name: phase1_libero_fobsfusion_avg}
