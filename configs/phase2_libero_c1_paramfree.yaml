# Phase 2 — C1 / F4 ablation 팔 A1: 파라미터-0 ζ_f readout (fine_mode=paramfree).
# ══════════════════════════════════════════════════════════════════════════
# phase2_libero_c1.yaml 의 클론. 유일 차이: module.f4.fine_mode: paramfree + 체크포인트/run_name.
# ζ_f readout = concat[ pool(ΔF) ; patchnorm(256) ] → 단일 Linear → 96d 병목 (선별=학습 0).
# 나머지(병목·tanh게이트 α=0·생성 flow·fine_action·L_consistency)는 kquery 팔과 동일.
# 근거: docs/A1_size_gate_probe_2026-07-13.md — 오프라인 readout 동급/우위 + F3-shortcut 통로 제거.
# C1 폐루프 게이트가 이 팔(A1) vs phase2_libero_c1.yaml(kquery) 을 비교한다.
# ══════════════════════════════════════════════════════════════════════════
phase1_ckpt: ~/clip_ws/checkpoints/phase1_libero_siglip2_large256.pt

data:
  source: libero
  root: ~/clip_ws/data/libero/libero_spatial
  camera: agentview_rgb
  wrist_camera: eye_in_hand_rgb
  chunk_sec: 0.8
  n_chunk: 16
  stride: 2
  val_episodes: 0.2
  cache_dir: /data2/clip_ws_cache/cache/libero_emb_large256      # ★격리 (so400m 1152d cache-key 충돌 방지)
  dense_cache_dir: /data2/clip_ws_cache/dense_full/siglip2_256   # HDD (SSD 93% full)

anchor:                          # pooled ζ_g 채널 = C1 기질
  name: siglip2
  projection: joint
  normalize: false               # NATIVE-BEST (phase1과 동일)
  model_dir: google/siglip2-large-patch16-256

module:
  name: flow
  flow_source: past
  flow_steps: 6
  source_noise: 0.1
  d_model: 1536
  layers: 4
  ctx_layers: 2
  lang_token: true               # ★ζ_f 쿼리 초기화 텍스트 임베딩에 필수
  wrist_token: true
  f4:                            # ★C1 fine 채널 (cowork D1–D4)
    enable: true
    fine_mode: paramfree         # ★A1 팔: 파라미터-0 selection readout (기본 kquery 아님)
    K: 8                         # D1 토큰 수 (paramfree에선 미사용 — zf_dim=bottleneck_dim)
    bottleneck_dim: 96           # D1 연속 병목(64~128d) — paramfree ζ_f 차원 = 96
    query_init: text             # D2 (paramfree readout엔 텍스트 미사용 — A1 text-reweight not-run)
    gate: tanh                   # D2 붕괴 방어 (α=0 init, Flamingo)
    d_attn: 768
    heads: 8
    flow_steps: 6
    dense:                       # D0 patch ΔF 소스 = 동일 백본(siglip2-large-256)
      name: siglip2
      model_dir: google/siglip2-large-patch16-256
      projection: joint
      normalize: false
      camera: agentview_rgb

loss:
  lat: 0.5                       # ζ_g CFM
  act: 1.0                       # FLD 디코딩 (frozen h + gated fine 잔차)
  wm: 0.0
  f_cfm: 0.5                     # ζ_f 생성 flow CFM
  consist: 0.1                   # L_consistency (ζ_f → pooled 변위)

train:
  batch_size: 256
  lr: 1.0e-4
  adam_betas: [0.95, 0.999]
  scheduler: cosine
  warmup_steps: 500
  epochs: 50
  early_stop_patience: 20
  seed: 2
  past_noise: 0.05
  checkpoint: ~/clip_ws/checkpoints/phase2_libero_c1_paramfree.pt

wandb: {enabled: true, project: clipvp, mode: online, run_name: phase2_libero_c1_paramfree}
