# Phase 1 (LIBERO) — P-zg2 state-free g′ 재적합 (DESIGN_pipeline_rethink_v1 §1.3)
# ══════════════════════════════════════════════════════════════════════════
# phase1_libero_fobsfusion_concat.yaml 과 완전 동일, 변경은 딱 두 줄:
#   model.encoder_state_cond: false  ← g가 z_t 없이 액션만으로 Δz 예측 (P-zg2 본체)
#   train.checkpoint / run_name      ← 산출물 분리 (기존 ckpt 절대 미변경)
# 판정: align cos / a2z retrieval / dec R² 하락폭 = z_t의 정보 기여량.
#   하락 "없음"이면 오히려 이상(Δz가 상태 무관?) — 어느 쪽이든 논문 수치.
# 실행 (원격, GPU 복구 후):
#   python src/training/train_phase1.py --config configs/phase1_libero_fobsfusion_concat_statefree.yaml
# 주: 2026-07-18 현재 원격 박스 컨테이너의 신규 프로세스 CUDA 불가(cgroup 이슈) —
#   학습 런은 박스 복구(또는 컨테이너 재기동) 후 실행. week0에서는 준비만 완료.
# ══════════════════════════════════════════════════════════════════════════
data:
  source: libero
  root: ~/clip_ws/data/libero/libero_spatial
  camera: agentview_rgb
  chunk_sec: 0.8
  n_chunk: 16
  val_episodes: 0.2
  cache_dir: /data2/clip_ws_cache/cache/libero_emb_fobsfusion_concat   # 기존 캐시 재사용

anchor:
  name: dualconcat
  projection: joint
  normalize: false
  siglip_dir: google/siglip2-large-patch16-256
  dino_dir: facebook/dinov3-vitl16-pretrain-lvd1689m
  force_size: 256

model:
  latent_dim: 768              # anchor.dim(2048)으로 자동 덮어씀
  hidden: 512
  layers: 4
  dropout: 0.2
  state_cond: true
  encoder_state_cond: false    # ★ P-zg2: state-free g′ (h는 state_cond 유지)

loss:
  align: 0.5
  recon: 0.5
  cycle: 0.25

train:
  batch_size: 256
  lr: 1.0e-4
  adam_betas: [0.95, 0.999]
  scheduler: cosine
  warmup_steps: 500
  epochs: 50
  early_stop_patience: 20
  seed: 0
  checkpoint: ~/clip_ws/checkpoints/phase1_libero_fobsfusion_concat_statefree.pt

wandb: {enabled: true, project: clipvp, mode: online, run_name: phase1_libero_fobsfusion_concat_statefree}
