# Phase 2 — F-OBS-FUSION Arm B (no-mix concat), NO-AUG clean regime (cowork F5-H L1 primary, 2026-07-15).
# ══════════════════════════════════════════════════════════════════════════
# cowork F5-H §1 L1: 융합 앵커 = concat[SigLIP2-pooled ; DINOv3-pooled] 2048d NO-MIX (서브블록 unit 유지,
#   avg의 스케일 뭉갬 회피). 언어정렬(조건 토큰)은 SigLIP2 블록만 — lang 토큰을 z 폭(2048)에 맞춰
#   SigLIP2 서브블록 위치[0:1024]에 zero-pad (train_phase2.py forward 훅, 학습 파라미터 0).
# L2: ζ = Δf_t = 융합(concat) 공간의 변위 (phase1 DeltaAE가 concat z 위에서 g/h 학습).
# 대조 = 기존 no-aug SigLIP2-pooled(85-88). 감사 판정대로 aug/module-dropout 없음(clean 88밴드).
# phase1_ckpt = concat z 로 DeltaAE 재적합한 phase1_libero_s2_concat_hflow.pt (선행 학습 필요).
# ══════════════════════════════════════════════════════════════════════════
phase1_ckpt: ~/clip_ws/checkpoints/phase1_libero_s2_concat_hflow.pt

data:
  source: libero
  root: ~/clip_ws/data/libero/libero_spatial
  camera: agentview_rgb
  wrist_camera: eye_in_hand_rgb
  chunk_sec: 0.8
  n_chunk: 16
  stride: 2
  val_episodes: 0.2
  cache_dir: /data2/clip_ws_cache/cache/libero_emb_fobsfusion_concat   # dualconcat cache_key로 자동 분리

anchor:                          # Arm B: 관측-레벨 no-mix concat (SigLIP2-L256 ⊕ DINOv3-vitl16)
  name: dualconcat
  projection: joint
  normalize: false               # ★concat 전역 재정규화 안 함 (서브블록 각각 unit = no-mix 취지)
  siglip_dir: google/siglip2-large-patch16-256
  dino_dir: facebook/dinov3-vitl16-pretrain-lvd1689m
  force_size: 256

module:
  name: flow
  flow_source: past
  flow_steps: 6
  source_noise: 0.1
  d_model: 1536
  layers: 4
  ctx_layers: 2
  lang_token: true
  wrist_token: true
  f4:
    enable: false                # ★pooled-only 융합: fine 채널 없음 (no-aug baseline과 동일)

loss:
  lat: 0.5
  act: 1.0
  wm: 0.0
  f_cfm: 0.0
  consist: 0.0

train:
  batch_size: 256
  lr: 1.0e-4
  adam_betas: [0.95, 0.999]
  scheduler: cosine
  warmup_steps: 500
  epochs: 50
  early_stop_patience: 20
  seed: 2
  past_noise: 0.05
  checkpoint: ~/clip_ws/checkpoints/phase2_libero_s2_concat_hflow_noaug.pt

wandb: {enabled: true, project: clipvp, mode: online, run_name: phase2_libero_s2_concat_hflow_noaug}
