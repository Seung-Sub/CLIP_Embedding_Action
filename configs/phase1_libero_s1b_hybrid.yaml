# Phase 1 (LIBERO) — S1b DeltaAE REFIT: fused concat z (2048) + HY03 hybrid 모션-언어 정렬.
# ══════════════════════════════════════════════════════════════════════════
# cowork S1b(2026-07-15f) 추가 요건: align_mode=hybrid(HY03, λ0.3)를 ζ의 SigLIP2 블록에만 적용.
#   fused ζ = Δ(dualconcat z) = [Δ_SigLIP2(1024); Δ_DINOv3(1024)]. 모션문장 InfoNCE 정렬을
#   ζ[0:1024](SigLIP2 의미 블록)에만 (align_block=1024) — 텍스트=SigLIP2(1024) 차원 정합.
#   DINOv3 블록(기하)엔 미적용. dz-align(l_align)은 full ζ(2048)에 유지 = 곱공간 변위 코드.
#   = C8/HY03 검증 레시피(폐루프 무손실+t2a 언어 획득), motion_vocab v1(phase1 팔 고정·holdout 불가침).
#   실행: python src/training/train_phase1.py --config configs/phase1_libero_s1b_hybrid.yaml
# 이 체크포인트가 phase2_libero_s1b_asym_hybrid_noaug.yaml 의 phase1_ckpt.
# ══════════════════════════════════════════════════════════════════════════
data:
  source: libero
  root: ~/clip_ws/data/libero/libero_spatial
  camera: agentview_rgb
  chunk_sec: 0.8
  n_chunk: 16
  val_episodes: 0.2
  cache_dir: /data2/clip_ws_cache/cache/libero_emb_fobsfusion_concat   # concat 캐시 재사용
  motion_vocab: v1               # HY03: phase1 팔 고정 vocab (holdout 불가침)

anchor:
  name: dualconcat
  projection: joint
  normalize: false               # concat 전역 재정규화 안 함 (서브블록 각 unit)
  siglip_dir: google/siglip2-large-patch16-256
  dino_dir: facebook/dinov3-vitl16-pretrain-lvd1689m
  force_size: 256

model:
  latent_dim: 768              # train_phase1.py:92-93가 anchor.dim(2048)으로 자동 덮어씀
  hidden: 512
  layers: 4
  dropout: 0.2
  state_cond: true
  align_mode: hybrid           # ★HY03: dz + λc·InfoNCE(모션문장)
  align_block: 1024            # ★InfoNCE를 ζ의 SigLIP2 블록[0:1024]에만 (텍스트=SigLIP2 1024 정합)

loss:
  align: 0.5                   # dz-align (full ζ 2048)
  recon: 0.5
  cycle: 0.25
  contrast: 0.3                # ★λ0.3 (HY03) — hybrid InfoNCE 가중

train:
  batch_size: 256
  lr: 1.0e-4
  adam_betas: [0.95, 0.999]
  scheduler: cosine
  warmup_steps: 500
  epochs: 50
  early_stop_patience: 20
  seed: 0
  checkpoint: ~/clip_ws/checkpoints/phase1_libero_s1b_hybrid.pt

wandb: {enabled: true, project: clipvp, mode: online, run_name: phase1_libero_s1b_hybrid}
