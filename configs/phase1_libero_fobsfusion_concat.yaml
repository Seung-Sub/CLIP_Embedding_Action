# Phase 1 (LIBERO) — F-OBS-FUSION Arm B DeltaAE REFIT: concat pooled z (dualconcat, 2048-d).
# ══════════════════════════════════════════════════════════════════════════
# phase1_libero_siglip2_large256.yaml 미러링, anchor 블록만 dualconcat 으로 스왑.
#   z = concat([L2norm(SigLIP2-L256), L2norm(DINOv3-vitl16 CLS)]) = 2048-d 를 target 공간으로
#   DeltaAE 재학습. latent_dim 은 anchor.dim(2048)으로 train_phase1.py:92-93 자동 설정.
# 이 체크포인트가 phase2_libero_fobsfusion_concat.yaml 의 phase1_ckpt.
#   실행:  python src/training/train_phase1.py --config configs/phase1_libero_fobsfusion_concat.yaml
# 주: phase1 은 image z 만 다루므로 lang 토큰 폭 이슈(2048 vs 1024)는 phase2 에서만 발생
#   (해당 config 의 REVIEW 주석 참조).
# ══════════════════════════════════════════════════════════════════════════
data:
  source: libero
  root: ~/clip_ws/data/libero/libero_spatial
  camera: agentview_rgb
  chunk_sec: 0.8
  n_chunk: 16
  val_episodes: 0.2
  cache_dir: /data2/clip_ws_cache/cache/libero_emb_fobsfusion_concat   # dualconcat cache_key로 자동 분리

anchor:
  name: dualconcat
  projection: joint
  normalize: false               # concat 재정규화 안 함 (서브블록 unit 유지)
  siglip_dir: google/siglip2-large-patch16-256
  dino_dir: facebook/dinov3-vitl16-pretrain-lvd1689m
  force_size: 256

model:
  latent_dim: 768              # train_phase1.py:92-93가 anchor.dim(2048)으로 자동 덮어씀
  hidden: 512
  layers: 4
  dropout: 0.2
  state_cond: true

loss:
  align: 0.5
  recon: 0.5
  cycle: 0.25

train:
  batch_size: 256
  lr: 1.0e-4
  adam_betas: [0.95, 0.999]
  scheduler: cosine
  warmup_steps: 500
  epochs: 50
  early_stop_patience: 20
  seed: 0
  checkpoint: ~/clip_ws/checkpoints/phase1_libero_fobsfusion_concat.pt

wandb: {enabled: true, project: clipvp, mode: online, run_name: phase1_libero_fobsfusion_concat}
