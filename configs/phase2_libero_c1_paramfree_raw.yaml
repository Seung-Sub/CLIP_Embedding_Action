# Phase 2 — C1 / F4 ablation 팔: 무선택·무병목 ζ_f (cowork FEEDBACK §2 교란분리).
# ══════════════════════════════════════════════════════════════════════════
# phase2_libero_c1_paramfree.yaml 의 클론. 유일 차이: bottleneck_dim 96 → 1280 (= dense_dim 1024 + patchnorm 256).
# 즉 readout Linear(1280→1280) = 용량 압축 없음 = 병목 제거.
# 게이트 3-way 교란분리 (cowork §2):
#   kquery(phase2_libero_c1)          = 학습선택 + 병목(96)
#   paramfree(phase2_libero_c1_paramfree) = 무선택 + 병목(96)
#   raw(이 파일)                       = 무선택 + 무병목(1280)
# → paramfree vs raw 차이 = 병목(용량제한=잡음필터, VLM-LAM 근거)의 폐루프 기여 격리.
# ══════════════════════════════════════════════════════════════════════════
phase1_ckpt: ~/clip_ws/checkpoints/phase1_libero_siglip2_large256.pt

data:
  source: libero
  root: ~/clip_ws/data/libero/libero_spatial
  camera: agentview_rgb
  wrist_camera: eye_in_hand_rgb
  chunk_sec: 0.8
  n_chunk: 16
  stride: 2
  val_episodes: 0.2
  cache_dir: /data2/clip_ws_cache/cache/libero_emb_large256      # ★격리 (so400m 1152d cache-key 충돌 방지)
  dense_cache_dir: /data2/clip_ws_cache/dense_full/siglip2_256   # HDD (SSD 93% full)

anchor:
  name: siglip2
  projection: joint
  normalize: false
  model_dir: google/siglip2-large-patch16-256

module:
  name: flow
  flow_source: past
  flow_steps: 6
  source_noise: 0.1
  d_model: 1536
  layers: 4
  ctx_layers: 2
  lang_token: true
  wrist_token: true
  f4:
    enable: true
    fine_mode: paramfree         # 무선택 readout
    K: 8
    bottleneck_dim: 1280         # ★무병목: 1024(pool ΔF) + 256(patchnorm) = 용량압축 없음
    query_init: text
    gate: tanh
    d_attn: 768
    heads: 8
    flow_steps: 6
    dense:
      name: siglip2
      model_dir: google/siglip2-large-patch16-256
      projection: joint
      normalize: false
      camera: agentview_rgb

loss:
  lat: 0.5
  act: 1.0
  wm: 0.0
  f_cfm: 0.5
  consist: 0.1

train:
  batch_size: 256
  lr: 1.0e-4
  adam_betas: [0.95, 0.999]
  scheduler: cosine
  warmup_steps: 500
  epochs: 50
  early_stop_patience: 20
  seed: 2
  past_noise: 0.05
  checkpoint: ~/clip_ws/checkpoints/phase2_libero_c1_paramfree_raw.pt

wandb: {enabled: true, project: clipvp, mode: online, run_name: phase2_libero_c1_paramfree_raw}
