# Phase 2 — P-A CROP-AVG arm 2 (avg 융합 + 양 브랜치 crop), NO-AUG clean regime (§8 P-A 사전등록).
# ══════════════════════════════════════════════════════════════════════════
# phase2_libero_cropavg_dino_noaug.yaml 과 동일, anchor.crop 만 dino → both (+ 경로들).
# 대조군 = phase2_libero_fobsfusion_avg_noaug.pt (avg no-crop 91.5). 게이트 동일:
#   G-off dec R²≥0.72 → G-cl vs avg 91.5 CI>0 → G-lang correct−wrong ≥+70pp.
# 실패 모드 예측(사전등록): 테두리-의존 태스크 per-task 하락 → "crop=중앙확대" 기전 절 보고.
# phase1_ckpt = crop-both fused z 로 DeltaAE 재적합한 phase1_libero_cropavg_both.pt (선행 학습 필요).
# ══════════════════════════════════════════════════════════════════════════
phase1_ckpt: ~/clip_ws/checkpoints/phase1_libero_cropavg_both.pt

data:
  source: libero
  root: ~/clip_ws/data/libero/libero_spatial
  camera: agentview_rgb
  wrist_camera: eye_in_hand_rgb
  chunk_sec: 0.8
  n_chunk: 16
  stride: 2
  val_episodes: 0.2
  cache_dir: /data2/clip_ws_cache/cache/libero_emb_cropavg   # phase1 과 동일 루트, cache_key 로 arm 분리

anchor:                          # P-A arm 2: avg 융합 + SigLIP2·DINO 양 브랜치 224 center-crop
  name: dualfusion
  projection: joint
  normalize: true                # 공식 최종 L2norm → 출력 unit (avg판 스케일 교정)
  siglip_dir: google/siglip2-large-patch16-256
  dino_dir: facebook/dinov3-vitl16-pretrain-lvd1689m
  alpha: 0.5                     # DINO 가중 (0.5 = 외부 E3 literal mean)
  force_size: 256                # DINOv3 256/16 = 16×16 (SigLIP2-L256 그리드 정합)
  crop: both                     # ★phase1_libero_cropavg_both.yaml 과 반드시 동일 (캐시/z 공간 일치)

module:
  name: flow
  flow_source: past
  flow_steps: 6
  source_noise: 0.1
  d_model: 1536
  layers: 4
  ctx_layers: 2
  lang_token: true
  wrist_token: true
  f4:
    enable: false                # ★pooled-only 융합: fine 채널 없음 (no-aug baseline과 동일)

loss:
  lat: 0.5                        # ζ_g CFM
  act: 1.0                        # FLD 디코딩 (frozen h)
  wm: 0.0
  f_cfm: 0.0                      # f4 없음
  consist: 0.0                    # f4 없음

train:
  batch_size: 256
  lr: 1.0e-4
  adam_betas: [0.95, 0.999]
  scheduler: cosine
  warmup_steps: 500
  epochs: 50
  early_stop_patience: 20
  seed: 2
  past_noise: 0.05
  checkpoint: ~/clip_ws/checkpoints/phase2_libero_cropavg_both_noaug.pt

wandb: {enabled: true, project: clipvp, mode: online, run_name: phase2_libero_cropavg_both_noaug}
