# Phase 2 — C2 CONTROL: pooled-ONLY SigLIP2-large-256 + C2와 동일 규제 (fine 채널 기여 격리).
# ══════════════════════════════════════════════════════════════════════════
# 플래그십(phase2_libero_c2.yaml)과 완전 동일한 phase1(large256)·FlowPolicy·하이퍼·규제 스택
# (both-aug 3-variant + projector dropout 0.2 + source/past noise) — 차이는 f4.enable=false 하나뿐.
# 즉 ζ = ζ_g(SigLIP2-large256 pooled Δ)만. dense(DINOv3) 캐시 불요 → 빠른 학습.
# 용도: 폐루프 게이트에서 C2-full vs 이 pooled+aug 를 paired bootstrap CI(src/analysis/paired_ci.py)로
#       비교 → "DINOv3 fine 채널의 순수 기여" 격리 (규제는 양팔 동일하므로 규제효과 상쇄).
# ══════════════════════════════════════════════════════════════════════════
phase1_ckpt: ~/clip_ws/checkpoints/phase1_libero_siglip2_large256.pt

data:
  source: libero
  root: ~/clip_ws/data/libero/libero_spatial
  camera: agentview_rgb
  wrist_camera: eye_in_hand_rgb
  chunk_sec: 0.8
  n_chunk: 16
  stride: 2
  val_episodes: 0.2
  cache_dir: /data2/clip_ws_cache/cache/libero_emb_large256        # 플래그십과 동일 pooled 캐시(+aug 뱅크)
  augment:                                                        # ★C2와 동일 규제 (both-aug 3-variant)
    view: 3
    wrist: 3

anchor:                          # C2와 동일 기질 (pooled ζ_g)
  name: siglip2
  projection: joint
  normalize: false               # NATIVE-BEST (phase1과 동일)
  model_dir: google/siglip2-large-patch16-256

module:
  name: flow
  flow_source: past
  flow_steps: 6
  source_noise: 0.1              # ★C2와 동일 규제
  dropout: 0.2                   # ★C2와 동일 규제
  d_model: 1536
  layers: 4
  ctx_layers: 2
  lang_token: true
  wrist_token: true
  f4:
    enable: false                # ★pooled-only: fine 채널 없음 (C2와의 유일한 차이)

loss:
  lat: 0.5                        # ζ_g CFM
  act: 1.0                        # FLD 디코딩 (frozen h)
  wm: 0.0
  f_cfm: 0.0                      # f4 없음
  consist: 0.0                    # f4 없음

train:
  batch_size: 256
  lr: 1.0e-4
  adam_betas: [0.95, 0.999]
  scheduler: cosine
  warmup_steps: 500
  epochs: 50
  early_stop_patience: 20
  seed: 2
  past_noise: 0.05               # ★C2와 동일 규제
  checkpoint: ~/clip_ws/checkpoints/phase2_libero_c2_control.pt

wandb: {enabled: true, project: clipvp, mode: online, run_name: phase2_libero_c2_control}
